# Kestrel — nginx.conf
# 
#
# Terminates TLS on port 443, enforces HTTP Basic Auth, proxies to the
# Next.js dashboard running on 127.0.0.1:3000.
#
# The dashboard is ONLY reachable via WireGuard VPN — this vhost is not
# in public DNS.  nginx never exposes the Prometheus (9090) or WebSocket
# (9101, 9102) ports externally.
#
# The .htpasswd file is NOT committed to version control (see .gitignore).
# Generate it with: htpasswd -c /etc/nginx/kestrel.htpasswd <operator>

# ── Global ──────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# ── HTTP block ───────────────────────────────────────────────────────────────

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Disable nginx version in headers
    server_tokens off;

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Permanent redirect — HSTS takes over after first HTTPS visit
        return 301 https://$host$request_uri;
    }

    # ── HTTPS / Dashboard ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # TLS — self-signed cert for internal use (replace with LetsEncrypt
        # if the host has a public domain reachable via VPN DNS).
        # Generate: openssl req -x509 -newkey rsa:4096 -keyout /etc/nginx/ssl/kestrel.key \
        #            -out /etc/nginx/ssl/kestrel.crt -days 3650 -nodes -subj '/CN=kestrel'
        ssl_certificate     /etc/nginx/ssl/kestrel.crt;
        ssl_certificate_key /etc/nginx/ssl/kestrel.key;

        # Modern TLS only
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security headers ──────────────────────────────────────────────

        # HSTS — min 1 year as required by 
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CSP — 
        # default-src 'self': blocks all external origins by default.
        # WebSocket connections are restricted to loopback only.
        # Tailwind needs style-src 'unsafe-inline' in development only;
        # in production builds all styles are static and this can be tightened.
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self'; "
            "style-src 'self' 'unsafe-inline'; "
            "img-src 'self' data:; "
            "font-src 'self'; "
            "connect-src 'self' ws://127.0.0.1:9101 ws://127.0.0.1:9102; "
            "frame-ancestors 'none';"
            always;

        # Clickjacking protection
        add_header X-Frame-Options "DENY" always;

        # MIME-sniffing protection
        add_header X-Content-Type-Options "nosniff" always;

        # Referrer policy — no referrer outside origin
        add_header Referrer-Policy "no-referrer" always;

        # ── HTTP Basic Auth ───────────────────────────────────────────────
        # Auth is enforced at the nginx layer — Next.js never sees an
        # unauthenticated request.
        auth_basic           "Kestrel — Operator Only";
        auth_basic_user_file /etc/nginx/kestrel.htpasswd;

        # ── Proxy to Next.js dashboard ────────────────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;

            # Required for Next.js SSE / streaming responses
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";

            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;

            # Disable buffering for SSE routes (Prometheus metrics stream)
            proxy_buffering    off;

            # Timeouts generous enough for SSE keep-alive
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Explicitly block any external access to internal ports ────────
        # These ports (Prometheus, WS metrics, WS control) must never be
        # reachable via this nginx instance.  The deny rules here are belt-
        # and-suspenders — the ports bind to 127.0.0.1 in the bot.
        location /metrics {
            deny all;
        }
    }

    # ── IMPORTANT: no server block for ports 9090, 9101, or 9102 ────────────
    # Those ports bind to 127.0.0.1 in the Rust bot and are never proxied
    # externally by nginx.  The firewall (ufw/iptables) must also block them
    # from the WireGuard interface — only the bot process itself connects.
}
